<script defer>

document.addEventListener('alpine:init', () => {
  console.log('alpine init fired');

  Alpine.data('message', () => ({
    name: 'Pete',
    age: 30,

    get ageText() {
      return `${this.age} years old`;
    },
  }));

  Alpine.data('counter', () => ({
    count: 0,

    increment() {
      this.count++;
    },
  }));

  Alpine.store('currentUser', {
    name: 'Pete',
    age: 30,
    posts: ['post 1', 'post 2', 'post 3'],
  });

  Alpine.data('todos', () => ({
    todos: [],

    async init() {
      const response = await fetch('https://jsonplaceholder.typicode.com/todos?_limit=3');
      const data = await response.json();
      this.todos = data;
    },
  }));

  Alpine.data('colorBoxes', () => ({
    colors: [],

    init() {
      this.colors = colors;
    }
  }))
});

</script>
